<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henosis · 所罗门钥匙</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;background:#0d0a08;overflow:hidden;}
        #reader{width:100%;height:100%;padding-top:60px;}
        .epub-container{background:#ede3c8 !important;}
        .epub-view{padding:40px !important;font-family:'Georgia',serif !important;line-height:1.8 !important;color:#2a1a10 !important;}
        .header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,10,8,0.85);backdrop-filter:blur(8px);padding:10px 24px;border-bottom:1px solid rgba(200,170,140,0.15);display:flex;justify-content:space-between;align-items:center;}
        .header h1{font-size:1.2rem;color:#f0e6d8;letter-spacing:4px;font-weight:400;font-family:'Georgia',serif;}
        .header .sub{font-size:0.7rem;color:rgba(200,180,160,0.4);letter-spacing:2px;}
        .header .controls{display:flex;gap:10px;align-items:center;}
        .header .controls button{background:rgba(255,255,255,0.05);border:1px solid rgba(200,170,140,0.15);color:rgba(200,185,170,0.6);padding:4px 14px;border-radius:16px;cursor:pointer;font-size:0.7rem;font-family:'Georgia',serif;transition:0.3s;letter-spacing:1px;}
        .header .controls button:hover{background:rgba(200,180,160,0.1);color:#f0e6d8;border-color:rgba(200,170,140,0.3);}
        #pageInfo{color:rgba(200,180,160,0.3);font-size:0.65rem;letter-spacing:1px;padding:0 10px;min-width:60px;text-align:center;}
        #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(200,180,160,0.4);font-size:1.2rem;letter-spacing:4px;font-family:'Georgia',serif;z-index:50;text-align:center;line-height:2;}
        @media(max-width:700px){.header h1{font-size:0.9rem;letter-spacing:2px;}.header .sub{display:none;}.header .controls button{padding:2px 10px;font-size:0.6rem;}}
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Henosis</h1>
            <span class="sub">Clavicula Salomonis</span>
        </div>
        <div class="controls">
            <button id="prevBtn">◀</button>
            <span id="pageInfo">— / —</span>
            <button id="nextBtn">▶</button>
            <button id="zoomOut">−</button>
            <button id="zoomIn">+</button>
        </div>
    </div>

    <div id="loading">加载中…</div>
    <div id="reader"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

    <script>
        // EPUB lives in the same repo folder — served directly, no proxy needed
        const EPUB_URL = './b24884431.epub';

        const loading = document.getElementById('loading');

        // Disable epub.js storage to avoid browser Tracking Prevention errors
        const book = ePub(EPUB_URL, { store: false });

        const rendition = book.renderTo('reader', {
            width: '100%',
            height: '100%',
            flow: 'paginated',
            spread: 'auto',
            minSpreadWidth: 600,
        });

        rendition.display().then(() => {
            loading.style.display = 'none';
        }).catch((err) => {
            loading.innerHTML = '❌ 加载失败<br><span style="font-size:0.8rem;opacity:0.7;">' + err.message + '</span>';
            loading.style.color = '#8a4a3a';
        });

        // Navigation
        document.getElementById('prevBtn').addEventListener('click', () => rendition.prev());
        document.getElementById('nextBtn').addEventListener('click', () => rendition.next());

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); rendition.next(); }
            if (e.key === 'ArrowLeft')                   { e.preventDefault(); rendition.prev(); }
        });

        // Zoom
        let zoom = 1;
        document.getElementById('zoomIn').addEventListener('click', () => {
            zoom = Math.min(1.8, zoom + 0.1);
            rendition.themes.fontSize(zoom * 100 + '%');
        });
        document.getElementById('zoomOut').addEventListener('click', () => {
            zoom = Math.max(0.6, zoom - 0.1);
            rendition.themes.fontSize(zoom * 100 + '%');
        });

        // Page indicator
        const pageInfo = document.getElementById('pageInfo');
        rendition.on('relocated', (location) => {
            const d = location && location.start && location.start.displayed;
            if (d && d.page) {
                pageInfo.textContent = d.page + ' / ' + (d.total || '?');
            }
        });
    </script>

</body>
</html>
